# Redis Stack provides the RediSearch module used for vector KNN with metadata
# filtering. The default local run does not need this - the in-memory store
# covers it - but bringing this up lets you run the exact same application code
# against a real vector database by setting MERIDIAN_BACKEND=redis.
#
#   docker compose up -d
#   MERIDIAN_BACKEND=redis python -m meridian.interfaces.cli.main --demo
#
# The RedisInsight UI is exposed on 8001 for inspecting keys and the index.

services:
  redis:
    image: redis/redis-stack:latest
    container_name: meridian-redis
    ports:
      - "6379:6379"   # Redis protocol
      - "8001:8001"   # RedisInsight UI
    volumes:
      - meridian-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  meridian-redis-data:
